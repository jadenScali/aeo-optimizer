scopes = "read_products,read_content,read_online_store_pages,write_metaobject_definitions,write_metaobjects,write_products,write_app_proxy,write_online_store_navigation"

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[app_proxy]
url = "/apps/proxy/ai-ref"
prefix = "apps"
